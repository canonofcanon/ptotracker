<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>Time Off · Review</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Mulish:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --navy:#0E2A47; --navy-2:#163a5f; --cyan:#1FA2B8; --gold:#C9A24B;
    --paper:#F4F6F9; --ink:#0E2A47; --muted:#5B6B7B; --line:#E3E8EE; --white:#fff;
    --green:#1f8a5b; --red:#b3261e;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:Mulish,system-ui,sans-serif;color:var(--ink);background:var(--paper)}
  .wrap{max-width:880px;margin:0 auto;padding:40px 22px 80px}
  .eyebrow{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--cyan);font-weight:700;margin:0 0 6px}
  h1{font-family:"Playfair Display",serif;font-weight:700;font-size:32px;margin:0 0 4px;color:var(--navy)}
  .sub{color:var(--muted);margin:0 0 30px;font-size:15px}
  h2{font-family:"Playfair Display",serif;font-size:21px;color:var(--navy);margin:36px 0 14px;
    padding-bottom:9px;border-bottom:1px solid var(--line)}
  .card{background:var(--white);border:1px solid var(--line);border-radius:13px;padding:30px}
  label{display:block;font-weight:600;font-size:13px;margin:0 0 7px;color:var(--navy)}
  input,select{font:inherit;color:var(--ink);background:var(--white);border:1px solid var(--line);
    border-radius:8px;padding:10px 11px;outline:none;transition:.15s}
  input:focus,select:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(31,162,184,.15)}
  .gate input{width:100%}
  .btn{cursor:pointer;border:none;border-radius:9px;padding:12px 16px;font-weight:700;font:inherit;
    font-weight:700;transition:.15s}
  .btn-primary{background:var(--gold);color:var(--navy)}
  .btn-primary:hover{filter:brightness(.96)}
  .btn-ghost{background:var(--white);border:1px solid var(--line);color:var(--navy)}
  .err{color:var(--red);font-size:13.5px;margin-top:12px;min-height:1px}

  .req{border:1px solid var(--line);border-radius:12px;padding:20px 22px;margin-bottom:14px;background:var(--white)}
  .req.flag{border-color:var(--gold);box-shadow:inset 3px 0 0 var(--gold)}
  .req .who{display:flex;justify-content:space-between;align-items:baseline;gap:12px}
  .req .who strong{font-size:17px;color:var(--navy)}
  .req .when{color:var(--muted);font-size:12.5px;white-space:nowrap}
  .req .msg{color:#33475b;font-size:14.5px;margin:10px 0 16px;padding-left:12px;border-left:2px solid var(--line)}
  .parsed{display:flex;flex-wrap:wrap;gap:8px 18px;align-items:center;font-size:13.5px;color:var(--muted);margin-bottom:16px}
  .parsed b{color:var(--navy)}
  .pill{background:var(--paper);border:1px solid var(--line);border-radius:20px;padding:4px 11px;font-size:12px;font-weight:700;color:var(--navy);text-transform:capitalize}
  .ledger-line{font-weight:700;color:var(--navy)}
  .ledger-line .after{color:var(--green)}
  .ledger-line .over{color:var(--red)}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .miniedit{display:flex;gap:8px;align-items:center;margin:0 0 14px;font-size:13px;color:var(--muted)}
  .miniedit input{width:64px;padding:7px 9px}
  .miniedit select{padding:7px 9px}
  .approve{background:var(--navy);color:var(--white)}
  .approve:hover{background:var(--navy-2)}
  .deny{background:var(--white);border:1px solid var(--line);color:var(--red)}

  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{text-align:left;padding:11px 10px;border-bottom:1px solid var(--line)}
  th{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:700}
  td.name{font-weight:700;color:var(--navy)}
  table input{width:72px;text-align:center;padding:8px}
  .balbar{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;align-items:center}
  .addrow{display:flex;gap:8px;margin-top:14px}
  .addrow input{flex:1}
  .empty{color:var(--muted);padding:18px 2px}
  .hist .req{opacity:.78;padding:14px 18px}
  .status{font-weight:700;font-size:12.5px;text-transform:uppercase;letter-spacing:.05em}
  .status.approved{color:var(--green)}
  .status.denied{color:var(--red)}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;
    padding:11px 20px;border-radius:24px;font-weight:600;font-size:14px;opacity:0;transition:.25s;pointer-events:none}
  .toast.show{opacity:1}
  details summary{cursor:pointer;color:var(--cyan);font-weight:700;font-size:14px;margin-top:8px}
</style>
</head>
<body>
<div class="wrap">
  <p class="eyebrow">SurtzMedia · Operations</p>
  <h1>Time-off review</h1>
  <p class="sub">Read each request, check the math, approve or deny. Balances live here.</p>

  <div id="gate" class="card gate" style="max-width:380px">
    <label for="pw">Admin password</label>
    <input id="pw" type="password" autocomplete="off" placeholder="Christian only" />
    <div class="row" style="margin-top:14px"><button class="btn btn-primary" id="unlock">Unlock</button></div>
    <div class="err" id="gateErr"></div>
  </div>

  <div id="app" style="display:none">
    <h2>Pending</h2>
    <div id="pending"></div>

    <h2>Balances</h2>
    <div class="card">
      <table id="balTable"><thead><tr><th>Name</th><th>PTO</th><th>Comp</th><th>Vacation</th></tr></thead><tbody></tbody></table>
      <div class="balbar">
        <button class="btn btn-primary" id="saveBal">Save balances</button>
        <span class="err" id="balErr" style="margin:0"></span>
      </div>
      <div class="addrow">
        <input id="newName" placeholder="Add a person…" />
        <button class="btn btn-ghost" id="addPerson">Add</button>
      </div>
    </div>

    <h2>History</h2>
    <details><summary id="histToggle">Show decided requests</summary><div id="history" class="hist" style="margin-top:14px"></div></details>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
  const $ = (id) => document.getElementById(id);
  const BUCKETS = ["pto", "comp", "vacation"];
  let pw = sessionStorage.getItem("pto_admin") || "";
  let state = { requests: [], balances: {} };

  function toast(msg){ const t=$("toast"); t.textContent=msg; t.classList.add("show");
    setTimeout(()=>t.classList.remove("show"),1800); }

  async function call(action, extra = {}) {
    const res = await fetch("/.netlify/functions/admin", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ password: pw, action, ...extra }),
    });
    const data = await res.json();
    if (res.status === 401) { lock(); throw new Error(data.error); }
    if (!res.ok) throw new Error(data.error || "Request failed");
    return data;
  }

  function lock(){ sessionStorage.removeItem("pto_admin"); pw="";
    $("app").style.display="none"; $("gate").style.display="block"; $("gateErr").textContent="Session ended — re-enter the password."; }

  function fmt(iso){ return new Date(iso).toLocaleDateString("en-US",{month:"short",day:"numeric"}); }

  function balanceLine(r){
    const bal = (state.balances[r.name]||{})[r.parsed.type];
    const days = Number(r.parsed.days);
    if (typeof bal !== "number") return `<span class="ledger-line">No ${r.parsed.type} balance on file</span>`;
    if (!Number.isFinite(days)) return `<span class="ledger-line">Current ${r.parsed.type}: ${bal} · set the days to see the result</span>`;
    const after = Number((bal - days).toFixed(2));
    const cls = after < 0 ? "over" : "after";
    return `<span class="ledger-line">Current ${r.parsed.type}: ${bal} → <span class="${cls}">${after}</span> after approval${after<0?" (over balance)":""}</span>`;
  }

  function renderPending(){
    const list = state.requests.filter(r=>r.status==="pending");
    const box = $("pending");
    if (!list.length){ box.innerHTML = `<div class="card empty">Nothing waiting. You're clear.</div>`; return; }
    box.innerHTML = list.map(r=>{
      const p = r.parsed;
      return `<div class="req ${p.needs_review?"flag":""}">
        <div class="who"><strong>${r.name}</strong><span class="when">${fmt(r.createdAt)}</span></div>
        <div class="msg">${escapeHtml(r.message)}</div>
        <div class="parsed">
          <span class="pill">${p.type}</span>
          <span><b>${p.days ?? "?"}</b> day(s)</span>
          ${p.dates?`<span>${escapeHtml(p.dates)}</span>`:""}
          ${p.needs_review?`<span style="color:var(--gold);font-weight:700">Needs a look</span>`:""}
        </div>
        <div class="miniedit">
          Adjust:
          <input type="number" step="0.5" value="${p.days ?? ""}" id="d-${r.id}" placeholder="days" />
          <select id="t-${r.id}">${BUCKETS.map(b=>`<option value="${b}" ${b===p.type?"selected":""}>${b}</option>`).join("")}</select>
          <button class="btn btn-ghost" style="padding:7px 12px" onclick="saveParsed('${r.id}')">Update</button>
        </div>
        <div style="margin-bottom:16px">${balanceLine(r)}</div>
        <div class="row">
          <button class="btn approve" onclick="decide('${r.id}','approve')">Approve</button>
          <button class="btn deny" onclick="decide('${r.id}','deny')">Deny</button>
        </div>
      </div>`;
    }).join("");
  }

  function renderHistory(){
    const list = state.requests.filter(r=>r.status!=="pending");
    $("histToggle").textContent = `Show decided requests (${list.length})`;
    $("history").innerHTML = list.length ? list.map(r=>`
      <div class="req">
        <div class="who"><strong>${r.name}</strong><span class="status ${r.status}">${r.status}</span></div>
        <div class="msg">${escapeHtml(r.message)}</div>
        <div class="parsed"><span class="pill">${r.parsed.type}</span><span><b>${r.parsed.days ?? "?"}</b> day(s)</span>${r.parsed.dates?`<span>${escapeHtml(r.parsed.dates)}</span>`:""}</div>
      </div>`).join("") : `<div class="empty">No history yet.</div>`;
  }

  function renderBalances(){
    const tb = $("balTable").querySelector("tbody");
    const names = Object.keys(state.balances);
    tb.innerHTML = names.length ? names.map(n=>{
      const b = state.balances[n];
      return `<tr><td class="name">${n}</td>${BUCKETS.map(k=>
        `<td><input type="number" step="0.5" value="${b[k]??0}" data-name="${n}" data-bucket="${k}" /></td>`).join("")}</tr>`;
    }).join("") : `<tr><td colspan="4" class="empty">No one yet — add a person below.</td></tr>`;
  }

  function renderAll(){ renderPending(); renderBalances(); renderHistory(); }

  function escapeHtml(s){ return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

  window.decide = async (id, decision) => {
    if (decision==="deny" && !confirm("Deny this request?")) return;
    try { const d = await call("decide",{id,decision}); state.requests=d.requests; state.balances=d.balances;
      renderAll(); toast(decision==="approve"?"Approved — balance updated":"Denied"); }
    catch(e){ toast(e.message); }
  };

  window.saveParsed = async (id) => {
    const days = $("d-"+id).value; const type = $("t-"+id).value;
    try { const d = await call("editParsed",{id,days,type}); state.requests=d.requests; renderAll(); toast("Updated"); }
    catch(e){ toast(e.message); }
  };

  $("saveBal").addEventListener("click", async () => {
    const next = {};
    $("balTable").querySelectorAll("input").forEach(inp=>{
      const n=inp.dataset.name, k=inp.dataset.bucket;
      next[n]=next[n]||{}; next[n][k]=Number(inp.value)||0;
    });
    try { const d = await call("setBalances",{balances:next}); state.balances=d.balances; renderAll(); toast("Balances saved"); }
    catch(e){ $("balErr").textContent=e.message; }
  });

  $("addPerson").addEventListener("click", async () => {
    const name = $("newName").value.trim(); if(!name) return;
    try { const d = await call("addPerson",{name}); state.balances=d.balances; $("newName").value=""; renderAll(); toast("Added "+name); }
    catch(e){ toast(e.message); }
  });

  async function boot(){
    try {
      const d = await call("list");
      state.requests=d.requests; state.balances=d.balances;
      $("gate").style.display="none"; $("app").style.display="block";
      renderAll();
    } catch(e){ /* stay on gate */ }
  }

  $("unlock").addEventListener("click", async () => {
    pw = $("pw").value.trim(); $("gateErr").textContent="";
    if(!pw) return ($("gateErr").textContent="Enter the password.");
    try { await call("list"); sessionStorage.setItem("pto_admin",pw); boot(); }
    catch(e){ $("gateErr").textContent = e.message || "Wrong password."; }
  });
  $("pw") && $("pw").addEventListener("keydown",e=>{ if(e.key==="Enter") $("unlock").click(); });

  if (pw) boot();
</script>
</body>
</html>
